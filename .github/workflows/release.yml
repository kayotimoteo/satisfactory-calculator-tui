name: release

# Dispara ao empurrar uma tag de versão (ex.: v1.0.0). Compila o .exe standalone
# de Windows x64 e publica uma GitHub Release com o binário + checksum anexados.
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # necessário pra criar a Release

jobs:
  release:
    runs-on: windows-latest # alvo é Windows x64 (--target=bun-windows-x64)
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Smoke-test calc core
        # Funções puras (sem TTY): falha o job se a matemática quebrar.
        run: |
          bun -e 'import {calcularClockParaMeta, calcularTaxa} from "./src/lib/satisfactory";
          const c = calcularClockParaMeta(2, 60, 120).clockNecessario;
          const t = calcularTaxa(2, 60, 100).total;
          if (Math.abs(c - 100) > 1e-6 || Math.abs(t - 120) > 1e-6) { console.error("calc core failed", {c, t}); process.exit(1); }
          console.log("calc core OK", {c, t});'

      - name: Build standalone .exe
        env:
          SFCALC_NO_INSTALL: "1" # em CI não copiamos pro ~/.local/bin
        run: bun run build:exe

      - name: Prepare release assets
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "sfcalc-$tag-windows-x64.exe"
          Copy-Item dist/satisfactory-calculator-tui.exe $asset
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sfcalc-*-windows-x64.exe
            sfcalc-*-windows-x64.exe.sha256

      # Escaneia o .exe no VirusTotal. É só informativo: binário compilado com Bun
      # costuma gerar falso-positivo de AV, então NÃO falhamos o job aqui.
      # Requer o secret VT_API_KEY (Settings > Secrets and variables > Actions).
      # if: garante que só roda quando a key existir, evitando quebrar forks.
      #
      # NÃO usamos update_release_body: essa opção da action só funciona quando o
      # workflow é disparado por um evento `release` (lê github.event.release).
      # Como aqui o gatilho é push de tag, ela escaneia mas não edita o corpo.
      # Por isso pegamos a saída `analysis` e anexamos na descrição no passo abaixo.
      - name: Scan release on VirusTotal
        id: vt
        if: ${{ env.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4 # respeita o limite do tier público (4 req/min)
          files: |
            sfcalc-*-windows-x64.exe

      # Anexa os links da análise ao corpo da Release usando a saída `analysis`
      # (formato: "arquivo1=url1,arquivo2=url2"). Split em '=' limitado a 2 partes
      # porque a URL do VT contém '==' (padding base64).
      - name: Append VirusTotal links to release notes
        if: ${{ steps.vt.outputs.analysis != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          $lines = foreach ($item in ($env:ANALYSIS -split ',')) {
            $name, $url = $item -split '=', 2
            "- [$name]($url)"
          }
          $current = gh release view $env:TAG --json body --jq .body
          $section = "`n`n## VirusTotal`nResultados da análise:`n`n" + ($lines -join "`n")
          Set-Content -Path vt-notes.md -Value ($current + $section) -Encoding utf8
          gh release edit $env:TAG --notes-file vt-notes.md
